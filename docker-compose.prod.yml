# PresuControl V5 - Coolify Production Deploy
# Use this with Coolify's Docker Compose service type.
# Environment variables are managed through Coolify's UI.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-presucontrol}
      POSTGRES_USER: ${POSTGRES_USER:-presucontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - presucontrol_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-presucontrol} -d ${POSTGRES_DB:-presucontrol}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-30}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-3600}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Madrid}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      REGISTRATION_REQUIRES_APPROVAL: ${REGISTRATION_REQUIRES_APPROVAL:-true}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_MINUTES: ${LOGIN_RATE_LIMIT_WINDOW_MINUTES:-10}
      RUN_CREATE_ALL: "false"
      RUN_DEFENSIVE_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - frontend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "8088:80"
    depends_on:
      - backend
    networks:
      - frontend

  # ── Backup sidecar ──────────────────────────────────────────────
  # Runs pg_dump on a cron schedule (default 03:00) into a shared volume.
  # Set BACKUP_SCHEDULE, BACKUP_RETENTION_DAYS, BACKUP_ENCRYPTION_PASSWORD
  # in Coolify env to customise. See backup/README.md for the full schema.
  backup:
    build:
      context: ./backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-presucontrol}
      POSTGRES_USER: ${POSTGRES_USER:-presucontrol}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_ENCRYPTION_PASSWORD: ${BACKUP_ENCRYPTION_PASSWORD:-}
      TZ: ${APP_TIMEZONE:-Europe/Madrid}
    volumes:
      - presucontrol_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Healthy = crond is running AND a backup file exists in the volume.
      # (We can't check the age of the last backup here without state — the
      # `.last_backup_at` heartbeat is checked by the host-level script
      # scripts/backup.sh via docker exec for now.)
      test: ["CMD-SHELL", "pgrep -x crond >/dev/null"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    networks:
      - internal

volumes:
  presucontrol_pgdata:
  presucontrol_backups:

networks:
  internal:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

name: CI

on:
  push:
    branches: [ main, codex/* ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============== BACKEND ==============
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: presucontrol
          POSTGRES_USER: presucontrol
          POSTGRES_PASSWORD: presucontrol
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U presucontrol -d presucontrol"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic upgrade
        run: cd backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql://presucontrol:presucontrol@localhost:5432/presucontrol
          JWT_SECRET_KEY: test-secret-key-not-for-production
          APP_SECRET_KEY: test-secret-key-for-testing
          AUTH_ENABLED: false
          ENV: test

      - name: Run tests
        run: cd backend && pytest -q --tb=short --ignore=tests/test_migrations_with_data.py --ignore=tests/test_migrations_postgresql.py
        env:
          DATABASE_URL: postgresql://presucontrol:presucontrol@localhost:5432/presucontrol
          JWT_SECRET_KEY: test-secret-key-not-for-production
          APP_SECRET_KEY: test-secret-key-for-testing
          AUTH_ENABLED: false
          ENV: test

  # ============== FRONTEND ==============
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node_modules-${{ runner.os }}-

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build

  # ============== E2E ==============
  # Smoke: valida que el spec compila y Playwright lo descubre.
  # La ejecución real contra stack completo se hace localmente con `npm run test:e2e`.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node_modules-${{ runner.os }}-

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright (no browsers; spec validation only)
        run: cd frontend && npx playwright install --dry-run chromium 2>/dev/null || true

      - name: List Playwright tests
        working-directory: frontend
        run: npx playwright test --list

  # ============== DOCKER BUILD ==============
  # Verifica que los Dockerfiles compilan, igual que en Coolify.
  # Si Dockerfile rompe, el CI falla antes del deploy.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: presucontrol-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: presucontrol-frontend:ci
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
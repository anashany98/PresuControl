version: 1

applications:
  - name: presucontrol
    build:
      dockerfile: Dockerfile
      context: .
    ports:
      - 3000:3000
    environment:
      - DATABASE_URL
      - JWT_SECRET_KEY
      - AUTH_ENABLED=true
      - APP_PUBLIC_URL
      - CORS_ORIGINS
    health_check:
      path: /health
      interval: 30s
      timeout: 10s
    deployment:
      branch: main
      port: 3000

databases:
  - name: presucontrol
    type: postgres
    version: "16"
    disk_size: 10GB
    backup:
      enabled: true
      retention_days: 30